<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0b" />
  <title>ПлатиЛегко! Admin</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin" id="app">
    <header class="admin-header">
      <div>
        <p class="admin-header__eyebrow">ПлатиЛегко!</p>
        <h1>Админ-панель</h1>
      </div>
      <div class="admin-badge" id="access-badge">Проверка…</div>
    </header>

    <div id="denied" class="denied" hidden>
      <h2>Нет доступа</h2>
      <p>Эта панель доступна только администратору.</p>
    </div>

    <div id="panel" hidden>
      <section class="stats" id="stats">
        <div class="stat-card">
          <span class="stat-card__label">Пользователи</span>
          <span class="stat-card__value" id="s-users">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-card__label">Задания</span>
          <span class="stat-card__value" id="s-tasks">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-card__label">Операции</span>
          <span class="stat-card__value" id="s-tx">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-card__label">Сумма балансов</span>
          <span class="stat-card__value" id="s-bal">—</span>
        </div>
      </section>

      <section class="menu">
        <h2 class="menu__title">Управление</h2>
        <button type="button" class="menu-item" data-action="tasks">
          <span class="menu-item__text">
            <strong>Задания</strong>
            <small>Список, создание, награды</small>
          </span>
          <span class="menu-item__soon">Скоро</span>
        </button>
        <button type="button" class="menu-item" data-action="users">
          <span class="menu-item__text">
            <strong>Пользователи</strong>
            <small>Балансы, блокировки, поиск</small>
          </span>
          <span class="menu-item__soon">Скоро</span>
        </button>
        <button type="button" class="menu-item" data-action="payouts">
          <span class="menu-item__text">
            <strong>Выплаты</strong>
            <small>Заявки на вывод</small>
          </span>
          <span class="menu-item__soon">Скоро</span>
        </button>
        <button type="button" class="menu-item" data-action="settings">
          <span class="menu-item__text">
            <strong>Настройки</strong>
            <small>Реферальный бонус, лимиты</small>
          </span>
          <span class="menu-item__soon">Скоро</span>
        </button>
      </section>

      <p class="footer-note">Отдельное приложение. Логику модулей подключим по мере разработки.</p>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>
  <script src="admin.js"></script>
</body>
</html>
